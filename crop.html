
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Recommendation | VASUDHA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-image:url('background.png');
    background-repeat:no-repeat;
    background-size:cover;
    background-position:center;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    padding-bottom:70px;
}

.top-section{
    text-align:center;
    padding-top:30px;
}

.vasudha-title{
    font-size:72px;
    font-weight:700;
    color:#18a9c8;
}

.vasudha-subtitle{
    font-size:22px;
    font-weight:700;
    color:#18a9c8;
}

.page-heading{
    text-align:center;
    color:white;
    font-size:32px;
    font-weight:bold;
    margin-top:20px;
}

.page-description{
    text-align:center;
    color:white;
    font-size:18px;
    margin-top:8px;
    margin-bottom:20px;
}

.back-btn{
    position:absolute;
    top:20px;
    left:20px;

    text-decoration:none;
    color:black;
    font-weight:bold;
    font-size:18px;
}

.form-card{
    width:90%;
    max-width:950px;
    margin:25px auto;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);

    border-radius:20px;
    padding:35px;

    border:1px solid rgba(255,255,255,0.25);
}

.hero-image{
    width:100%;
    max-width:650px;
    display:block;
    margin:0 auto 30px auto;
    border-radius:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

label{
    color:white;
    font-weight:bold;
    margin-bottom:8px;
    display:block;
}

select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    background:white;
}

.button-area{
    text-align:center;
    margin-top:30px;
}

.btn-grad{

    padding:16px 40px;

    border:none;
    border-radius:10px;

    color:white;
    font-size:18px;
    font-weight:bold;

    cursor:not-allowed;

    background:#7f8c8d;

    transition:0.3s;
}

.btn-grad.active{
    cursor:pointer;

    background-image:
    linear-gradient(
        to right,
        #314755 0%,
        #26a0da 51%,
        #314755 100%
    );

    background-size:200% auto;
}

.btn-grad.active:hover{
    background-position:right center;
}

.result-card{
    display:none;

    margin-top:35px;

    background:rgba(255,255,255,0.18);

    border-radius:15px;

    padding:25px;

    color:white;

    text-align:center;
}

.result-card h1{
    margin-top:10px;
}

.bottom-strip{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);

    border-top:1px solid rgba(255,255,255,0.2);

    text-align:center;

    padding:10px;

    color:black;

    font-size:15px;
    font-weight:500;

    z-index:999;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .vasudha-title{
        font-size:50px;
    }

    .page-heading{
        font-size:26px;
    }
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back</a>

<div class="top-section">

    <div class="vasudha-title">
        VASUDHA
    </div>

    <div class="vasudha-subtitle">
        Future Technology & Smart Systems
    </div>

</div>

<div class="page-heading">
    CROP RECOMMENDATION SYSTEM
</div>

<div class="page-description">
    Helping Farmers Choose the Right Crop
</div>

<div class="form-card">

    <img
    src="farming-banner.png"
    class="hero-image"
    alt="Smart Farming">

    <div class="form-grid">

        <div>
            <label>Region</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Region</option>
                <option>East India</option>
                <option>North India</option>
                <option>West India</option>
                <option>Central India</option>
                <option>South India</option>
            </select>
        </div>

        <div>
            <label>Month</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Month</option>
                <option>January</option>
                <option>February</option>
                <option>March</option>
                <option>April</option>
                <option>May</option>
                <option>June</option>
                <option>July</option>
                <option>August</option>
                <option>September</option>
                <option>October</option>
                <option>November</option>
                <option>December</option>
            </select>
        </div>

        <div>
            <label>Soil Type</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Soil Type</option>
                <option>Silt</option>
                <option>Loamy</option>
                <option>Clay</option>
                <option>Sandy</option>
            </select>
        </div>

        <div>
            <label>Water Availability</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Water Availability</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>
        </div>

        <div>
            <label>Temperature</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Temperature</option>
                <option>15-20°C</option>
                <option>20-25°C</option>
                <option>25-30°C</option>
                <option>30-35°C</option>
                <option>35-40°C</option>
            </select>
        </div>

        <div>
            <label>Rainfall</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Rainfall</option>
                <option>0-50 mm</option>
                <option>50-100 mm</option>
                <option>100-150 mm</option>
                <option>150-200 mm</option>
                <option>200-250 mm</option>
            </select>
        </div>

        <div>
            <label>Soil Moisture</label>
            <select class="required-field">
                <option value="" disabled selected hidden>Select Soil Moisture</option>
                <option>10-25%</option>
                <option>25-40%</option>
                <option>40-55%</option>
                <option>55-70%</option>

            <select class="required-field">

                <option>0.5-10 Acres</option>

                <option>20-30 Acres</option>
                <option>30-40 Acres</option>
                <option>40-50 Acres</option>
            </select>
        </div>

    </div>

    <div class="button-area">

        <button id="recommendBtn" class="btn-grad" disabled>
            RECOMMEND CROP
        </button>

    </div>

    <div class="result-card" id="result">

        <h2>🌾 Recommended Crop</h2>

        <h1>WHEAT</h1>

    </div>

</div>

<div class="bottom-strip">
    AI Powered Agriculture • Future Technology & Smart Systems
</div>

<script>

const dropdowns =
document.querySelectorAll('.required-field');

const button =
document.getElementById('recommendBtn');

dropdowns.forEach(dropdown => {
    dropdown.addEventListener('change', checkFields);
});

function checkFields(){

    let allFilled = true;

    dropdowns.forEach(dropdown => {
        if(dropdown.value === ""){
            allFilled = false;
        }
    });

    if(allFilled){
        button.disabled = false;
        button.classList.add('active');
    }
    else{
        button.disabled = true;
        button.classList.remove('active');
    }
}

function average(range){

    let nums =
    range.replace(/[^\d.-]/g,'')
         .split('-');

    return (
        parseFloat(nums[0]) +
        parseFloat(nums[1])
    ) / 2;
}

button.addEventListener('click', async function(){

    const payload = {

        region: dropdowns[0].value,
        month: dropdowns[1].value,
        soil_type: dropdowns[2].value,
        water_availability: dropdowns[3].value,

        temperature_c:
        average(dropdowns[4].value),

        rainfall_mm:
        average(dropdowns[5].value),

        soil_moisture_percent:
        average(dropdowns[6].value),

        field_size_acres:
        average(dropdowns[7].value)

    };

    try{

        button.innerText =
        "PREDICTING...";

        const response =
        await fetch(
            "https://vasudhad.onrender.com/predict",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(payload)
            }
        );

        const result =
        await response.json();

        if(result.success){

            document.querySelector(
                "#result h1"
            ).innerText =
            result.crop.toUpperCase();

            document.getElementById(
                "result"
            ).style.display =
            "block";

        }
        else{

            alert(
                "Prediction Error"
            );

            console.log(result.error);

        }

    }
    catch(error){

        alert(
            "Unable to connect to AI Server"
        );

        console.error(error);

    }

    button.innerText =
    "RECOMMEND CROP";

});

</script>

</body>
</html>
