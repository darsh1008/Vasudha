<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUDHA - AI Smart Farming Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-image:url('background.png');
    background-repeat:no-repeat;
    background-size:cover;
    background-position:center;
    min-height:100vh;
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.vasudha-container{
    text-align:center;
    margin-top:50px;
}

.vasudha-title{
    color:#18a9c8;
    font-size:80px;
    font-weight:700;
    letter-spacing:1px;
    line-height:1;
}

.vasudha-subtitle{
    color:#18a9c8;
    font-size:24px;
    font-weight:700;
    margin-top:10px;
}

.buttons-section{
    margin-top:70px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.btn-grad{

    margin:11px;

    width:310px;
    height:170px;

    border-radius:10px;

    text-decoration:none;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    background-image:
    linear-gradient(
        to right,
        #314755 0%,
        #26a0da 51%,
        #314755 100%
    );

    background-size:200% auto;

    font-size:21px;
    font-weight:bold;
    text-align:center;

    transition:background-position .5s ease;
}

.btn-grad:hover{
    color:white;
    background-position:right center;
}

.btn-text{
    line-height:1.4;
}

.bottom-strip{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);

    border-top:1px solid rgba(255,255,255,0.2);

    text-align:center;

    padding:10px;

    color:black;

    font-size:15px;
    font-weight:500;

    z-index:999;
}

@media(max-width:768px){

    .vasudha-title{
        font-size:55px;
    }

    .vasudha-subtitle{
        font-size:18px;
    }

    .buttons-section{
        margin-top:40px;
    }

    .btn-grad{
        width:280px;
        height:110px;
        margin:8px auto;
    }
}

</style>
</head>

<body>

<div class="container vasudha-container">

    <div class="vasudha-title">
        VASUDHA
    </div>

    <div class="vasudha-subtitle">
        Future Technology & Smart Systems
    </div>

    <div class="buttons-section">

        <a href="crop.html" class="btn-grad">
            <div class="btn-text">
                CROP<br>
                RECOMMENDATION
            </div>
        </a>

        <a href="harvest.html" class="btn-grad">
            <div class="btn-text">
                HARVEST TIME<br>
                PREDICTOR
            </div>
        </a>

        <a href="revenue.html" class="btn-grad">
            <div class="btn-text">
                REVENUE<br>
                PREDICTOR
            </div>
        </a>

    </div>

</div>

<div class="bottom-strip">
    AI Powered Agriculture • Future Technology & Smart Systems
</div>

</body>
</html>
```
